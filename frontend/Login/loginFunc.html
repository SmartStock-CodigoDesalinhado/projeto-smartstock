<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>SmartStock - Login</title>
  <link rel="stylesheet" href="loginFunc.css">
</head>
<body>

<header class="topo">
  <div class="logo">CD</div>
  <h1>SmartStock</h1>
</header>

<div class="container">
  
  <!-- LADO ESQUERDO -->
  <div class="login-box">
    <h2>Entrar</h2>
    <p>Informe seus dados para continuar</p>

    <label>Email:</label>
    <input type="text">

    <label>Senha:</label>
    <input type="password">
    <span class="erro">Esqueceu minha senha</span>

    <button class="btn-entrar">Entre</button>

    <button class="btn-google">
      <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
      Conectar com o Google
    </button>

    <button class="btn-facebook">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
      Conectar com o Facebook
    </button>
  </div>

  <!-- LADO DIREITO -->
  <div class="cadastro-box">
    <div class="emoji">🤔</div>
    <h2>Novo aqui?</h2>
    <p>Crie sua conta e aproveite todos os benefícios de ser um cliente.</p>
    <button>Crie sua conta</button>
  </div>

</div>

</body>
</html>
